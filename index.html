<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Test - Kavárna v srdci Jindřichova Hradce</title>
    <meta name="description" content="Test Test - útulná kavárna v Jindřichově Hradci. Čerstvě pražená káva, domácí dezerty a&nbsp;příjemná atmosféra v&nbsp;historickém centru města.">
    <meta property="og:title" content="Test Test - Kavárna v Jindřichově Hradci">
    <meta property="og:description" content="Útulná kavárna s čerstvě praženou kávou a domácími dezerty v historickém centru Jindřichova Hradce.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://testtest.webzitra.cz">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #92400e;
            --primary-rgb: 146, 64, 14;
            --primary-light: #b37956;
            --primary-dark: #662d0a;
            --primary-glow: rgba(146, 64, 14, 0.2);
            --bg: #ffffff;
            --bg-alt: #f8fafc;
            --bg-dark: #0f172a;
            --bg-dark-2: #1e293b;
            --text: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #64748b;
            --surface: #ffffff;
            --surface-glass: rgba(255,255,255,0.7);
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 40px -8px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 clamp(1rem, 4vw, 2rem);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
            background: transparent;
        }

        nav.scrolled {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }

        nav.scrolled .logo {
            color: var(--primary);
        }

        nav:not(.scrolled) .logo {
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        nav:not(.scrolled) .nav-links a {
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        nav.scrolled .nav-links a {
            color: var(--text);
        }

        .nav-links a:hover {
            color: var(--primary) !important;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: #fff;
            transition: all 0.3s ease;
        }

        nav.scrolled .hamburger span {
            background: var(--text);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                box-shadow: var(--shadow-lg);
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a {
                color: var(--text) !important;
                text-shadow: none !important;
            }

            .hamburger {
                display: flex;
            }
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
            background-image: url('https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg?auto=compress&cs=tinysrgb&w=1600&h=900&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .hero > * {
            position: relative;
            z-index: 2;
        }

        .hero-content {
            padding-bottom: 4rem;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        .hero p {
            font-size: clamp(1.1rem, 2.5vw, 1.3rem);
            color: rgba(255,255,255,0.9);
            max-width: 500px;
            margin-bottom: 2rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }

        .hero-cta {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }

        .btn {
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(146, 64, 14, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
        }

        .btn-secondary:hover {
            background: #fff;
            color: var(--text);
            transform: translateY(-2px);
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            max-width: 600px;
            margin: 0;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        .stat {
            text-align: center;
            padding: 1.25rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .stat-number {
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .hero {
                min-height: 80vh;
                background-attachment: scroll;
            }

            .hero-content {
                padding-bottom: 2rem;
            }

            .hero-cta {
                flex-direction: column;
                max-width: 280px;
            }

            .hero-stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.75rem;
                max-width: 100%;
            }

            .stat {
                padding: 1rem 0.5rem;
            }

            .stat-number {
                font-size: 1.25rem;
            }
        }

        /* Sections */
        .section {
            padding: clamp(3rem, 8vw, 6rem) 0;
        }

        .section-badge {
            display: inline-block;
            background: var(--primary-glow);
            color: var(--primary-dark);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .section-subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .bg-dark {
            background: var(--bg-dark);
            color: var(--text-light);
        }

        .bg-dark .section-badge {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }

        .bg-dark .section-subtitle {
            color: rgba(255,255,255,0.8);
        }

        .bg-alt {
            background: var(--bg-alt);
        }

        /* About Section */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-image {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .about-image img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .about-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
        }

        .about-text p {
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .about-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .about-image img {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="#" class="logo">Lavendy</a>
            <ul class="nav-links">
                <li><a href="#about">O nás</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#contact">Kontakt</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Vítejte v kavárně Lavendy</h1>
                <p>Objevte dokonalou kombinaci čerstvě pražené kávy, domácích dezertů a útulné atmosféry v historickém centru.</p>
                <div class="hero-cta">
                    <a href="#menu" class="btn btn-primary">Podívejte se na menu</a>
                    <a href="#contact" class="btn btn-secondary">Kontaktujte nás</a>
                </div>
                <div class="hero-stats">
                    <div class="stat">
                        <div class="stat-number">15+</div>
                        <div class="stat-label">Let in business</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">500+</div>
                        <div class="stat-label">Happy customers</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">100%</div>
                        <div class="stat-label">Fresh ingredients</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</html>
